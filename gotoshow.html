<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端适配关键标签 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>gotoshow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 隐藏页面滚动条，全屏无留白 */
        }
        /* 全屏iframe */
        #mainIframe {
            width: 100%;
            height: 100%;
            border: none; /* 去掉默认边框 */
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="mainIframe"></iframe>

    <script>
        // 5个目标链接，自行替换
        const urlList = [
            "https://www.baidu.com",
            "https://www.bing.com",
            "https://www.163.com",
            "https://www.qq.com",
            "https://www.sogou.com"
        ];

        // 随机取一个链接
        function getRandomUrl() {
            const randomIdx = Math.floor(Math.random() * urlList.length);
            return urlList[randomIdx];
        }

        // 赋值给iframe
        const iframe = document.getElementById('mainIframe');
        iframe.src = getRandomUrl();
    </script>
</body>
</html>
