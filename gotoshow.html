<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- JS失效兜底固定跳转（填5个里任意一个） -->
<meta http-equiv="refresh" content="3; url=https://app5.bipinhui.shop">
<title>随机跳转（WebView兼容）</title>
<style>
/* 隐藏跳转链接，不显示给用户 */
#autoJump {display:none;}
</style>
</head>
<body>
<a id="autoJump" target="_self"></a>
<script>
// 5个目标跳转地址，自行替换
const urls = [
    "https://app1.bipinhui.shop",
    "https://app2.bipinhui.shop",
    "https://app3.bipinhui.shop",
    "https://app4.bipinhui.shop",
    "https://app5.bipinhui.shop"
];
// 随机取一个地址
const randomUrl = urls[Math.floor(Math.random() * urls.length)];
const linkDom = document.getElementById("autoJump");
linkDom.href = randomUrl;

// 延迟执行模拟点击，绕过WebView自动跳转拦截
setTimeout(()=>{
    linkDom.click(); // 模拟人工点击a标签，WebView不会拦截
}, 2500);
</script>
<p>页面2.5秒后自动跳转，如长时间无响应请手动刷新</p>
</body>
</html>
